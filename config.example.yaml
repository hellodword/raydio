server:
  # HTTP listen address for raydio.
  addr: "127.0.0.1:8080"

  # Per-client-IP HTTP request limit. /healthz is exempt.
  rate_limit_rps: 10

  # Per-client-IP burst size for HTTP request limiting.
  rate_limit_burst: 30

  # Maximum concurrent MP3 streams allowed from one client IP.
  max_streams_per_ip: 4

  # Maximum concurrent server-sent event streams allowed from one client IP.
  max_events_per_ip: 8

  # CIDRs or exact IPs for reverse proxies whose client-IP headers are trusted.
  # Keep empty unless raydio is only reachable through those proxies.
  # Examples for local Nginx/cloudflared:
  # trusted_proxy_cidrs: ["127.0.0.1/32", "::1/128"]
  trusted_proxy_cidrs: []

  # Header order used only when the immediate peer matches trusted_proxy_cidrs.
  # Supported values: CF-Connecting-IP, X-Forwarded-For, X-Real-IP.
  client_ip_headers: ["CF-Connecting-IP", "X-Forwarded-For", "X-Real-IP"]

  # Background schedule maintenance interval.
  # This uses Go duration syntax, such as 500ms, 15s, 1m, or 1h.
  schedule_interval: 1m

  # Shared audio chunk size produced once by the main service and fanned out to listeners.
  # 480ms is 20 MP3 frames at 48 kHz.
  stream_chunk_window: 480ms

  # Per-listener live catch-up window. Slow listeners skip old chunks after this window.
  stream_buffer_window: 2s

  # Maximum time a listener write may block before the connection is closed.
  stream_write_timeout: 5s

suno:
  # How often suno-worker syncs each configured Suno playlist.
  sync_interval: 30m

  # HTTP timeout for Suno playlist and media downloads.
  http_timeout: 30s

  # Maximum bytes accepted for a downloaded Suno MP3.
  max_audio_bytes: 134217728

  # Maximum bytes accepted for a downloaded Suno cover image.
  max_cover_bytes: 16777216

worker:
  # Base source MP3 directory scanned by raydio-worker.
  # Each configured radio uses a uuid subdirectory below this path.
  # Leave empty to use <data_dir>/inbox.
  inbox_dir: ""

  # How often raydio-worker performs a full inbox rescan in addition to
  # fsnotify event-driven scans.
  # This uses Go duration syntax, such as 500ms, 15s, 1m, or 1h.
  rescan_interval: 30s
