# Raydio configuration.
# Copy this file to config.yaml before starting raydio-worker and raydio.
#
# Both processes read the same config file:
#   CGO_ENABLED=1 go run ./cmd/raydio-worker
#   CGO_ENABLED=1 go run ./cmd/raydio

# Root data directory. Raydio stores the SQLite database and media cache here.
data_dir: ./data

# Silence frames inserted between tracks.
# At 48 kHz MP3, one frame is 24 ms. 209 frames is about 5.016 seconds.
gap_frames: 209

# Minimum structured log level for both binaries.
# Supported values: DEBUG, INFO, WARN, ERROR.
log_level: DEBUG

radios:
  # Each configured radio scans <worker.inbox_dir>/<uuid> and streams at
  # /radio/<alias> and /radio/<uuid>.
  - alias: monthly
    uuid: "00000000-0000-0000-0000-000000000001"
  - alias: weekly
    uuid: "00000000-0000-0000-0000-000000000002"

server:
  # HTTP listen address for raydio.
  addr: ":8080"

  # Background schedule maintenance interval.
  # This uses Go duration syntax, such as 500ms, 15s, 1m, or 1h.
  schedule_interval: 1m

  # Shared audio chunk size produced once by the main service and fanned out to listeners.
  # 480ms is 20 MP3 frames at 48 kHz.
  stream_chunk_window: 480ms

  # Per-listener live catch-up window. Slow listeners skip old chunks after this window.
  stream_buffer_window: 2s

  # Maximum time a listener write may block before the connection is closed.
  stream_write_timeout: 5s

worker:
  # Base source MP3 directory scanned by raydio-worker.
  # Each configured radio uses a uuid subdirectory below this path.
  # Leave empty to use <data_dir>/inbox.
  inbox_dir: ""

  # How often raydio-worker rescans the inbox directory.
  # This uses Go duration syntax, such as 500ms, 15s, 1m, or 1h.
  rescan_interval: 30s
