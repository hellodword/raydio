server:
  # HTTP listen address for raydio.
  addr: "127.0.0.1:8080"

  # Background schedule maintenance interval.
  # This uses Go duration syntax, such as 500ms, 15s, 1m, or 1h.
  schedule_interval: 1m

  # Shared audio chunk size produced once by the main service and fanned out to listeners.
  # 480ms is 20 MP3 frames at 48 kHz.
  stream_chunk_window: 480ms

  # Per-listener live catch-up window. Slow listeners skip old chunks after this window.
  stream_buffer_window: 2s

  # Maximum time a listener write may block before the connection is closed.
  stream_write_timeout: 5s

suno:
  # How often suno-worker syncs each configured Suno playlist.
  sync_interval: 30m

  # HTTP timeout for Suno playlist and media downloads.
  http_timeout: 30s

worker:
  # Base source MP3 directory scanned by raydio-worker.
  # Each configured radio uses a uuid subdirectory below this path.
  # Leave empty to use <data_dir>/inbox.
  inbox_dir: ""

  # How often raydio-worker rescans the inbox directory.
  # This uses Go duration syntax, such as 500ms, 15s, 1m, or 1h.
  rescan_interval: 30s
