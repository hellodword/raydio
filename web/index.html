<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Raydio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="player">
      <section class="coverWrap" aria-label="Cover">
        <img id="cover" class="cover" alt="" />
        <div id="coverFallback" class="coverFallback">Raydio</div>
      </section>
      <section class="meta">
        <div id="status" class="status">connecting</div>
        <h1 id="title">No track</h1>
        <a id="artist" target="_blank" rel="noreferrer">Unknown artist</a>
      </section>
      <section class="controls" aria-label="Controls">
        <label class="station">
          <span>Station</span>
          <select id="station"></select>
        </label>
        <button id="play" type="button">播放</button>
      </section>
      <section class="command" aria-label="Stream command">
        <span id="copyStatus" class="copyStatus" aria-live="polite"></span>
        <code id="streamUrl" class="copyBox" tabindex="0" role="button" aria-label="Copy stream URL"></code>
        <code id="streamCommand" class="copyBox" tabindex="0" role="button" aria-label="Copy curl command"></code>
      </section>
    </main>
    <audio id="audio" preload="none"></audio>
    <script src="/app.js"></script>
  </body>
</html>
