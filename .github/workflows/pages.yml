name: Deploy Pages

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public HTTPS base URL of the Raydio API
        required: true
        type: string

concurrency:
  group: raydio-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Build static player
        env:
          RAYDIO_API_BASE_URL: ${{ inputs.base_url }}
        run: python3 scripts/build_pages.py --base-url "$RAYDIO_API_BASE_URL" --output _site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
